name: Build iOS .NET MAUI App

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Apple Team ID (optional - will auto-extract if not provided)'
        required: false
        type: string

jobs:
    build-ios:
        runs-on: macos-latest
        timeout-minutes: 60

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  global-json-file: './global.json'

            - name: Install MAUI workload
              run: dotnet workload install maui --version 9.0.102

            - name: Restore dependencies
              run: dotnet restore BingoMAUI.csproj

            - name: Decode and install provisioning profile
              env:
                APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
              run: |
                    echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
                    # Create the standard macOS directory where Xcode looks for provisioning profiles
                    mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
                    cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"

            - name: Decode and install signing certificate
              env:
                APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
              run: |
                # Decode certificate
                echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
                
                # Create variables
                KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
                KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
                
                # Create temporary keychain
                security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                
                # Import certificate to keychain
                # Try with password first, if it fails, try without password
                if [ -n "$APPLE_CERT_PASSWORD" ]; then
                  security import cert.p12 -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" || \
                  security import cert.p12 -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                else
                  security import cert.p12 -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                fi
                
                # Add keychain to search list
                security list-keychains -d user -s "$KEYCHAIN_PATH"
                
                # Allow codesign to access keychain without prompting
                security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            - name: Build iOS IPA
              run: |
                dotnet publish BingoMAUI.csproj \
                  -f net9.0-ios \
                  -c Release \
                  -p:RuntimeIdentifier=ios-arm64 \
                  -p:ArchiveOnBuild=true \
                  -p:CodesignKey="Apple Distribution" \
                  -p:CodesignProvision="Bingo By Carlos 2 Provisioning Profile"
                echo "::notice::iOS IPA build completed successfully"

            - name: Extract Team ID
              id: team-id
              run: |
                if [ -n "${{ inputs.team_id }}" ]; then
                  TEAM_ID="${{ inputs.team_id }}"
                  echo "Using provided Team ID: $TEAM_ID"
                else
                  # Extract from certificate
                  TEAM_ID=$(security find-certificate -c "Apple Distribution" -p 2>/dev/null | \
                    openssl x509 -noout -text 2>/dev/null | \
                    grep "OU = " | head -1 | awk '{print $NF}' || echo "")
                  
                  if [ -z "$TEAM_ID" ]; then
                    echo "::error::Could not extract Team ID from certificate"
                    exit 1
                  fi
                  echo "Extracted Team ID from certificate: $TEAM_ID"
                fi
                echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT

            - name: Notarize IPA
              timeout-minutes: 30
              run: |
                IPA_PATH=$(find . -name "*.ipa" -type f | head -n 1)
                if [ -z "$IPA_PATH" ]; then
                  echo "::error::No IPA file found"
                  exit 1
                fi
                echo "Found IPA at: $IPA_PATH"
                
                echo "Starting notarization..."
                xcrun notarytool submit "$IPA_PATH" \
                  --apple-id "${{ secrets.APPLE_ID }}" \
                  --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                  --team-id "${{ steps.team-id.outputs.team_id }}" \
                  --wait \
                  --timeout 30m
                
                if [ $? -eq 0 ]; then
                  echo "::notice::Notarization completed successfully"
                else
                  echo "::error::Notarization failed"
                  exit 1
                fi

            - name: Upload to App Store Connect
              timeout-minutes: 15
              run: |
                IPA_PATH=$(find . -name "*.ipa" -type f | head -n 1)
                if [ -z "$IPA_PATH" ]; then
                  echo "::error::No IPA file found for upload"
                  exit 1
                fi
                
                echo "Uploading IPA to App Store Connect..."
                /Applications/Transporter.app/Contents/MacOS/Transporter \
                  -m upload \
                  -u "${{ secrets.APPLE_ID }}" \
                  -p "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                  -f "$IPA_PATH" \
                  -success "successfulupload" || {
                  echo "::error::Upload to App Store Connect failed"
                  exit 1
                }
                echo "::notice::Upload to App Store Connect completed successfully"\

            - name: Upload IPA artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: iOS-IPA
                path: '**/*.ipa'
                retention-days: 7
                if-no-files-found: warn
                
            - name: Cleanup
              if: always()
              run: |
                rm -f cert.p12 profile.mobileprovision
                KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
                security delete-keychain "$KEYCHAIN_PATH" || true